<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ApexCore Operator</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #08080f;
      --surface: #10101a;
      --border: #1c1c2e;
      --accent: #7c3aed;
      --accent2: #06b6d4;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
      --text: #e2e8f0;
      --muted: #4a5568;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 900; color: white;
    }
    .logo h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo h1 span { color: var(--accent); }
    .logo sub { font-size: 11px; color: var(--muted); display: block; margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 20px; }
    .vps-badge {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; color: var(--muted);
      background: var(--bg);
      padding: 5px 12px; border-radius: 20px;
      border: 1px solid var(--border);
    }
    .pulse {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    #clock { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
    main { padding: 28px 32px; max-width: 1400px; margin: 0 auto; }
    .section-label {
      font-size: 11px; text-transform: uppercase; letter-spacing: 2px;
      color: var(--muted); margin-bottom: 14px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 14px;
      margin-bottom: 28px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px;
      cursor: pointer;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
    }
    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(124,58,237,.04), rgba(6,182,212,.04));
      opacity: 0;
      transition: opacity 0.18s;
    }
    .card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 28px rgba(124,58,237,.12); }
    .card:hover::after { opacity: 1; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
    .icon {
      width: 38px; height: 38px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 19px;
    }
    .status { display: flex; align-items: center; gap: 5px; font-size: 11px; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
    }
    .dot.online { background: var(--green); animation: pulse 2s infinite; }
    .dot.offline { background: var(--red); }
    .dot.checking { background: var(--yellow); animation: pulse .8s infinite; }
    .card-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .card-desc { font-size: 12px; color: var(--muted); line-height: 1.55; margin-bottom: 14px; }
    .card-url { font-size: 11px; color: var(--accent2); font-family: monospace; }
    .open-btn {
      display: inline-flex; align-items: center; gap: 5px;
      margin-top: 14px; padding: 6px 14px;
      background: var(--accent); color: white;
      border-radius: 6px; font-size: 12px; font-weight: 500;
      text-decoration: none; border: none; cursor: pointer;
      transition: background 0.15s;
    }
    .open-btn:hover { background: #6d28d9; }
    .bottom { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
    .panel h3 { font-size: 13px; font-weight: 600; margin-bottom: 14px; color: var(--text); }
    .links { display: flex; flex-direction: column; gap: 7px; }
    .link {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 13px;
      background: var(--bg);
      border-radius: 8px;
      text-decoration: none; color: var(--text); font-size: 13px;
      transition: background 0.15s;
    }
    .link:hover { background: #14141f; }
    .link-arrow { color: var(--muted); font-size: 16px; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .stat { background: var(--bg); border-radius: 8px; padding: 14px; }
    .stat-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
    .stat-value { font-size: 24px; font-weight: 700; }
    .stat-value.green { color: var(--green); }
    .stat-value.sm { font-size: 14px; margin-top: 3px; }
    @media (max-width: 700px) {
      main { padding: 16px; }
      header { padding: 14px 16px; }
      .bottom { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <div class="logo-icon">AC</div>
      <div>
        <h1>Apex<span>Core</span></h1>
        <sub>Operator Dashboard</sub>
      </div>
    </div>
    <div class="header-right">
      <div class="vps-badge">
        <div class="pulse"></div>
        76.13.138.73
      </div>
      <div id="clock">--:--:--</div>
    </div>
  </header>

  <main>
    <div class="section-label">Services</div>
    <div class="grid" id="grid"></div>

    <div class="section-label">Schnellzugriff</div>
    <div class="bottom">
      <div class="panel">
        <h3>Externe Tools</h3>
        <div class="links">
          <a class="link" href="https://console.anthropic.com" target="_blank">
            <span>🤖 Anthropic Console</span><span class="link-arrow">›</span>
          </a>
          <a class="link" href="https://www.notion.so" target="_blank">
            <span>📓 Notion Workspace</span><span class="link-arrow">›</span>
          </a>
          <a class="link" href="https://openrouter.ai/settings/keys" target="_blank">
            <span>🔀 OpenRouter Keys</span><span class="link-arrow">›</span>
          </a>
          <a class="link" href="https://perplexity.ai" target="_blank">
            <span>🔍 Perplexity Search</span><span class="link-arrow">›</span>
          </a>
          <a class="link" href="http://76.13.138.73:5678/workflow" target="_blank">
            <span>⚡ n8n Workflow Editor</span><span class="link-arrow">›</span>
          </a>
        </div>
      </div>
      <div class="panel">
        <h3>System Status</h3>
        <div class="stats">
          <div class="stat">
            <div class="stat-label">Online</div>
            <div class="stat-value green" id="s-online">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">Services</div>
            <div class="stat-value" id="s-total">—</div>
          </div>
          <div class="stat">
            <div class="stat-label">VPS</div>
            <div class="stat-value sm">Ubuntu 22.04</div>
          </div>
          <div class="stat">
            <div class="stat-label">Letzter Check</div>
            <div class="stat-value sm" id="s-time">—</div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    const services = [
      { name: 'n8n Automations', desc: 'Workflow Engine — Claude, Notion, Webhooks', url: 'http://76.13.138.73:5678', icon: '⚡', bg: '#1a1040' },
      { name: 'Open WebUI', desc: 'Chat Interface für lokale & externe LLMs', url: 'http://76.13.138.73:3000', icon: '💬', bg: '#0f1f3d' },
      { name: 'Hermes Agent', desc: 'Hermes WebUI — Chat & Aufgaben', url: 'http://76.13.138.73:32772', icon: '🤖', bg: '#0f2818' },
      { name: 'Paperclip', desc: 'AI Orchestrator & Task Manager', url: 'http://76.13.138.73:52309', icon: '📎', bg: '#2a1010' },
      { name: 'ApexCore Dashboard', desc: 'Haupt-Dashboard & Service Monitor', url: 'http://76.13.138.73:3011', icon: '🎯', bg: '#101030' },
      { name: 'Notion', desc: 'Command Center — Docs, Tasks, Logs', url: 'https://notion.so', icon: '📓', bg: '#181818', external: true }
    ];

    let statusMap = {};

    async function ping(url, ext) {
      if (ext) return 'online';
      try {
        await fetch(url, { mode: 'no-cors', signal: AbortSignal.timeout(5000) });
        return 'online';
      } catch { return 'offline'; }
    }

    function render() {
      document.getElementById('grid').innerHTML = services.map((s, i) => `
        <div class="card" onclick="window.open('${s.url}','_blank')">
          <div class="card-top">
            <div class="icon" style="background:${s.bg}">${s.icon}</div>
            <div class="status">
              <div class="dot ${statusMap[i] || 'checking'}" id="d${i}"></div>
              <span style="color:var(--muted)" id="t${i}">${statusMap[i]==='online'?'Online':statusMap[i]==='offline'?'Offline':'Checking'}</span>
            </div>
          </div>
          <div class="card-name">${s.name}</div>
          <div class="card-desc">${s.desc}</div>
          <div class="card-url">${s.url}</div>
          <a class="open-btn" href="${s.url}" target="_blank" onclick="event.stopPropagation()">Öffnen →</a>
        </div>
      `).join('');
    }

    async function checkAll() {
      render();
      const results = await Promise.all(services.map((s, i) =>
        ping(s.url, s.external).then(status => {
          statusMap[i] = status;
          const d = document.getElementById('d' + i);
          const t = document.getElementById('t' + i);
          if (d) d.className = 'dot ' + status;
          if (t) t.textContent = status === 'online' ? 'Online' : 'Offline';
          return status;
        })
      ));
      const online = results.filter(s => s === 'online').length;
      document.getElementById('s-online').textContent = online;
      document.getElementById('s-total').textContent = services.length;
      document.getElementById('s-time').textContent = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
    }

    setInterval(() => {
      document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE');
    }, 1000);
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('de-DE');

    checkAll();
    setInterval(checkAll, 30000);
  </script>
</body>
</html>
