# ApexCore — nginx reverse proxy (all apexcore.group subdomains)
# Deployed by GitHub Actions to: /etc/nginx/sites-available/apexcore.conf
# Activated via symlink:  /etc/nginx/sites-enabled/apexcore.conf
#
# SSL: wildcard cert via certbot at /etc/letsencrypt/live/apexcore.group/
# Obtain once:
#   certbot certonly --dns-cloudflare -d "apexcore.group" -d "*.apexcore.group"
# Or per-domain (adjust ssl_certificate paths accordingly):
#   certbot --nginx -d ai.apexcore.group -d hermes.apexcore.group ...
#
# After editing: nginx -t && nginx -s reload

# ─── SSL shared params ──────────────────────────────────────────────────────────

map $host $ssl_cert {
    default /etc/letsencrypt/live/apexcore.group/fullchain.pem;
}
map $host $ssl_key {
    default /etc/letsencrypt/live/apexcore.group/privkey.pem;
}

# ─── HTTP → HTTPS redirect ─────────────────────────────────────────────────────

server {
    listen 80;
    server_name apexcore.group *.apexcore.group;
    return 301 https://$host$request_uri;
}

# ─── Common proxy headers snippet (inlined) ───────────────────────────────────
# Used in all proxy blocks below via include or repetition.

# ─── ai.apexcore.group — Open WebUI ──────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name ai.apexcore.group;

    ssl_certificate     /etc/letsencrypt/live/apexcore.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apexcore.group/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# openwebui.apexcore.group → redirect to ai.apexcore.group

server {
    listen 443 ssl http2;
    server_name openwebui.apexcore.group;

    ssl_certificate     /etc/letsencrypt/live/apexcore.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apexcore.group/privkey.pem;

    return 301 https://ai.apexcore.group$request_uri;
}

# ─── hermes.apexcore.group — Hermes Control Panel ────────────────────────────

server {
    listen 443 ssl http2;
    server_name hermes.apexcore.group;

    ssl_certificate     /etc/letsencrypt/live/apexcore.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apexcore.group/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 100M;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

# ─── n8n.apexcore.group — n8n Automation ─────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name n8n.apexcore.group;

    ssl_certificate     /etc/letsencrypt/live/apexcore.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apexcore.group/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}

# ─── ops.apexcore.group — OpenClaw ───────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name ops.apexcore.group;

    ssl_certificate     /etc/letsencrypt/live/apexcore.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apexcore.group/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ─── oc.apexcore.group + oc-staging — OpenClaw legacy ────────────────────────

server {
    listen 443 ssl http2;
    server_name oc.apexcore.group oc-staging.apexcore.group;

    ssl_certificate     /etc/letsencrypt/live/apexcore.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apexcore.group/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    location /n8n/ {
        rewrite ^/n8n(/.*)$ $1 break;
        proxy_pass         http://127.0.0.1:5678;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# ─── dashboard.apexcore.group — Static Dashboard ─────────────────────────────

server {
    listen 443 ssl http2;
    server_name dashboard.apexcore.group;

    ssl_certificate     /etc/letsencrypt/live/apexcore.group/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apexcore.group/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root  /opt/apexcore-dashboard;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
