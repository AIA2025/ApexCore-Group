name: Deploy to VPS

on:
  push:
    branches: [main, "claude/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS deploy webhook
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Triggering deploy for branch: $BRANCH"

          # cmd-api proxied via hermes.apexcore.group/cmd-api/ (Hostinger CDN, HTTPS)
          # Direct :7070 and bare IP:80 are blocked/intercepted by Hostinger
          BASE="https://hermes.apexcore.group/cmd-api"

          CMD_HEALTH=$(curl -sf --connect-timeout 5 "$BASE/health" || echo "unreachable")
          echo "cmd-api health: $CMD_HEALTH"

          HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "$BASE/deploy" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CMD_API_TOKEN }}" \
            -d "{\"branch\":\"$BRANCH\"}" \
            --connect-timeout 10 --max-time 15)

          echo "Webhook response ($HTTP): $(cat /tmp/resp.json)"

          if [ "$HTTP" != "202" ]; then
            echo "::error::Webhook failed (HTTP $HTTP)."
            echo "Recovery: APEXCORE_BRANCH=$BRANCH bash <(curl -fsSL https://raw.githubusercontent.com/AIA2025/ApexCore-Group/$BRANCH/scripts/bootstrap.sh)"
            exit 1
          fi

          echo "Waiting 60s for VPS to redeploy..."
          sleep 60

          # Verify cmd-api is still up after deploy
          curl -sf "$BASE/health" \
            && echo "cmd-api healthy after deploy" \
            || echo "cmd-api not responding — check /var/log/apexcore-deploy.log on VPS"

      - name: Add DNS Records via Porkbun API
        # Note: step-level env: is not available in if: expressions — check inline
        env:
          PB_KEY: ${{ secrets.PORKBUN_APIKEY }}
          PB_SECRET: ${{ secrets.PORKBUN_SECRETKEY }}
          DOMAIN: "apexcore.group"
          VPS_IP: "76.13.138.73"
        run: |
          if [ -z "$PB_KEY" ]; then
            echo "PORKBUN_APIKEY not configured — skipping DNS update"
            exit 0
          fi
          add_record() {
            local name=$1
            R=$(curl -s -X POST "https://api.porkbun.com/api/json/v3/dns/create/$DOMAIN" \
              -H "Content-Type: application/json" \
              -d "{\"apikey\":\"$PB_KEY\",\"secretapikey\":\"$PB_SECRET\",\"name\":\"$name\",\"type\":\"A\",\"content\":\"$VPS_IP\",\"ttl\":\"300\"}")
            echo "$name: $(echo $R | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("status","?") + " " + str(d.get("id","")))')"
          }
          echo "Adding DNS A-records..."
          for sub in ai hermes n8n ops dashboard openwebui oc oc-staging paperclip; do add_record "$sub"; done
          echo "DNS update done"
