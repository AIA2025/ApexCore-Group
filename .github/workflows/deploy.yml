name: Deploy to VPS

on:
  push:
    branches: [main, "claude/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Copy repo structure to VPS ────────────────────────────────────
      - name: Sync files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 76.13.138.73
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          source: >
            infra-compose/docker-compose.yml,
            infra-compose/Caddyfile,
            infra-compose/.env.example,
            ai-stack/docker-compose.yml,
            ai-stack/hermes-config.yaml,
            ai-stack/.env.example,
            automation-stack/docker-compose.yml,
            automation-stack/.env.example,
            automation-stack/templates/,
            n8n-workflows/,
            cmd-api/server.py,
            dashboard/index.html,
            scripts/,
            docs/
          target: /srv/apexcore
          strip_components: 0
          overwrite: true

      # ── VPS: apply config + restart services ──────────────────────────
      - name: Apply config on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.138.73
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            set -e

            # Ensure directory structure exists
            mkdir -p /srv/apexcore/backups
            chmod +x /srv/apexcore/scripts/*.sh 2>/dev/null || true

            # ── Caddy config ─────────────────────────────────────────────
            CADDY_OLD=/opt/openclaw/reverse-proxy/Caddyfile
            CADDY_NEW=/srv/apexcore/infra-compose/Caddyfile

            # Backup current config
            if [ -f "$CADDY_OLD" ]; then
              BACKUP="$CADDY_OLD.bak.$(date +%Y%m%d_%H%M%S)"
              cp "$CADDY_OLD" "$BACKUP"
              cp "$BACKUP" "/srv/apexcore/backups/Caddyfile.bak.$(date +%Y%m%d_%H%M%S)"
            fi

            # Keep old path in sync for any container still mounting it
            cp "$CADDY_NEW" "$CADDY_OLD" 2>/dev/null || true

            # Validate + reload (works for both old and new caddy containers)
            if docker inspect caddy &>/dev/null; then
              docker exec caddy caddy validate --config /etc/caddy/Caddyfile 2>&1 | tail -3
              docker exec caddy caddy reload --config /etc/caddy/Caddyfile
              echo "✅ Caddy reloaded"
            else
              echo "⚠️  Caddy container not running — config updated, start with stack-start.sh"
            fi

            # ── Dashboard ─────────────────────────────────────────────────
            mkdir -p /opt/apexcore-dashboard
            cp /srv/apexcore/dashboard/index.html /opt/apexcore-dashboard/index.html
            echo "✅ Dashboard updated"

            # ── cmd-api ───────────────────────────────────────────────────
            pkill -f "cmd-api/server.py" 2>/dev/null || true
            sleep 1
            CMD_TOKEN="${{ secrets.CMD_API_TOKEN }}" \
              nohup python3 /srv/apexcore/cmd-api/server.py \
              > /var/log/cmd-api.log 2>&1 &
            echo "✅ cmd-api started on port 7070"

            # ── Legacy n8n cleanup ────────────────────────────────────────
            docker stop n8n-lx1z-n8n-1 2>/dev/null && echo "✅ legacy n8n stopped" || true

            # ── Notion backup cron ────────────────────────────────────────
            CRON="30 2 * * * /root/scripts/notion-backup.sh >> /root/logs/notion-backup.log 2>&1"
            crontab -l 2>/dev/null | grep -q "notion-backup" || \
              (crontab -l 2>/dev/null; echo "$CRON") | crontab -
            echo "✅ Notion backup cron active"

            echo "🚀 Deploy complete: $(hostname) @ $(date)"
            echo ""
            echo "── Container status ──────────────────────────────────────"
            docker ps --format "  {{.Names}}\t{{.Status}}" 2>/dev/null | sort || true

      # ── DNS Records (Porkbun) ─────────────────────────────────────────
      - name: Add DNS Records via Porkbun API
        if: ${{ env.PB_KEY != '' }}
        env:
          PB_KEY: ${{ secrets.PORKBUN_APIKEY }}
          PB_SECRET: ${{ secrets.PORKBUN_SECRETKEY }}
          DOMAIN: "apexcore.group"
          VPS_IP: "76.13.138.73"
        run: |
          add_record() {
            local name=$1
            R=$(curl -s -X POST "https://api.porkbun.com/api/json/v3/dns/create/$DOMAIN" \
              -H "Content-Type: application/json" \
              -d "{\"apikey\":\"$PB_KEY\",\"secretapikey\":\"$PB_SECRET\",\"name\":\"$name\",\"type\":\"A\",\"content\":\"$VPS_IP\",\"ttl\":\"300\"}")
            echo "$name: $(echo $R | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("status","?") + " " + str(d.get("id","")))')"
          }
          echo "Adding DNS A-records..."
          for sub in ai hermes n8n ops dashboard openwebui oc paperclip; do
            add_record "$sub"
          done
          echo "DNS update done"
