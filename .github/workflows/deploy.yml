name: Deploy to VPS

on:
  push:
    branches: [main, "claude/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.138.73
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            set -e
            BRANCH="${{ github.ref_name }}"
            RAW="https://raw.githubusercontent.com/AIA2025/apexcore/$BRANCH"

            # ── Caddyfile (keep existing if not in branch) ───────────────────
            cp /opt/openclaw/reverse-proxy/Caddyfile \
              /opt/openclaw/reverse-proxy/Caddyfile.bak.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
            if curl -fsSL "$RAW/Caddyfile" > /tmp/Caddyfile.new 2>/dev/null \
                && [ -s /tmp/Caddyfile.new ]; then
              cp /tmp/Caddyfile.new /opt/openclaw/reverse-proxy/Caddyfile
              docker exec caddy caddy validate --config /etc/caddy/Caddyfile 2>&1 | tail -2 || true
              docker exec caddy caddy reload --config /etc/caddy/Caddyfile \
                && echo "Caddy reloaded" || echo "Caddy reload skipped"
            else
              echo "Caddyfile not in branch '$BRANCH', keeping existing"
            fi

            # ── Dashboard ────────────────────────────────────────────────────
            mkdir -p /opt/apexcore-dashboard
            if curl -fsSL "$RAW/dashboard/index.html" > /tmp/dashboard.html 2>/dev/null \
                && [ -s /tmp/dashboard.html ]; then
              cp /tmp/dashboard.html /opt/apexcore-dashboard/index.html
              echo "Dashboard updated"
            else
              echo "dashboard/index.html not in branch '$BRANCH', keeping existing"
            fi

            # ── cmd-api ──────────────────────────────────────────────────────
            mkdir -p /opt/apexcore/cmd-api
            if curl -fsSL "$RAW/cmd-api/server.py" > /tmp/cmd-api-server.py 2>/dev/null \
                && [ -s /tmp/cmd-api-server.py ]; then
              cp /tmp/cmd-api-server.py /opt/apexcore/cmd-api/server.py
              pkill -f "cmd-api/server.py" 2>/dev/null || true
              sleep 1
              CMD_TOKEN="${{ secrets.CMD_API_TOKEN }}" \
                nohup python3 /opt/apexcore/cmd-api/server.py > /var/log/cmd-api.log 2>&1 &
              echo "cmd-api started on port 7070"
            else
              echo "cmd-api/server.py not in branch '$BRANCH', keeping existing"
            fi

            # ── ApexCore MVP Scanner ─────────────────────────────────────────
            mkdir -p /opt/apexcore-mvp/output

            curl -fsSL "$RAW/apexcore-mvp/main.py" -o /opt/apexcore-mvp/main.py
            curl -fsSL "$RAW/apexcore-mvp/requirements.txt" -o /opt/apexcore-mvp/requirements.txt
            echo "Scanner files downloaded"

            # Install Python dependencies
            pip3 install -r /opt/apexcore-mvp/requirements.txt \
              --break-system-packages -q 2>&1 | tail -5
            echo "Python deps installed"

            # Install Playwright Chromium (cached after first run ~2 min)
            if [ ! -d "$HOME/.cache/ms-playwright" ] || \
               [ -z "$(ls -A $HOME/.cache/ms-playwright 2>/dev/null)" ]; then
              echo "Installing Playwright Chromium (first time)..."
              python3 -m playwright install chromium 2>&1 | tail -10
              python3 -m playwright install-deps chromium 2>&1 | tail -5 || true
              echo "Playwright Chromium installed"
            else
              echo "Playwright Chromium already cached"
            fi

            # Create .env if missing
            if [ ! -f /opt/apexcore-mvp/.env ]; then
              cat > /opt/apexcore-mvp/.env << 'ENVEOF'
            ANTHROPIC_API_KEY=PLACEHOLDER_MARJAN_TRAEGT_EIN
            SUPABASE_URL=PLACEHOLDER_MARJAN_TRAEGT_EIN
            SUPABASE_KEY=PLACEHOLDER_MARJAN_TRAEGT_EIN
            GPTZERO_API_KEY=placeholder
            COPYLEAKS_API_KEY=placeholder
            WINSTON_API_KEY=placeholder
            HERMES_URL=http://localhost:32771/api/chat
            OUTPUT_DIR=/opt/apexcore-mvp/output
            ENVEOF
              echo ".env created — add API keys manually"
            else
              echo ".env already exists, not overwriting"
            fi

            # Restart scanner
            pkill -f "apexcore-mvp/main.py" 2>/dev/null || true
            pkill -f "uvicorn main:app" 2>/dev/null || true
            sleep 2

            cd /opt/apexcore-mvp
            nohup python3 -m uvicorn main:app \
              --host 0.0.0.0 --port 8000 --log-level info \
              > /var/log/apexcore-mvp.log 2>&1 &
            sleep 4

            curl -sf http://localhost:8000/health \
              && echo "ApexCore MVP Scanner running on :8000" \
              || (echo "Scanner health check FAILED" && tail -20 /var/log/apexcore-mvp.log && exit 1)

            # ── Maintenance ──────────────────────────────────────────────────
            docker stop n8n-lx1z-n8n-1 2>/dev/null && echo "old n8n stopped" || true

            CRON="30 2 * * * /root/scripts/notion-backup.sh >> /root/logs/notion-backup.log 2>&1"
            crontab -l 2>/dev/null | grep -q "notion-backup" || \
              (crontab -l 2>/dev/null; echo "$CRON") | crontab -
            echo "Cronjob active"

            echo ""
            echo "Deploy complete on $(hostname)"
            echo "  Health:  http://76.13.138.73:8000/health"
            echo "  Dossier: http://76.13.138.73:8000/dossier/latest"

      - name: Add DNS Records via Porkbun API
        if: ${{ env.PB_KEY != '' }}
        env:
          PB_KEY: ${{ secrets.PORKBUN_APIKEY }}
          PB_SECRET: ${{ secrets.PORKBUN_SECRETKEY }}
          DOMAIN: "apexcore.group"
          VPS_IP: "76.13.138.73"
        run: |
          add_record() {
            local name=$1
            R=$(curl -s -X POST "https://api.porkbun.com/api/json/v3/dns/create/$DOMAIN" \
              -H "Content-Type: application/json" \
              -d "{\"apikey\":\"$PB_KEY\",\"secretapikey\":\"$PB_SECRET\",\"name\":\"$name\",\"type\":\"A\",\"content\":\"$VPS_IP\",\"ttl\":\"300\"}")
            echo "$name: $(echo $R | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get(\"status\",\"?\") + \" \" + str(d.get(\"id\",\"\")))')"
          }
          echo "Adding DNS A-records..."
          for sub in n8n openwebui hermes dashboard paperclip scanner; do add_record "$sub"; done
          echo "DNS update done"
