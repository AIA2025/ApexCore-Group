name: Deploy to VPS

on:
  push:
    branches: [main, "claude/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.138.73
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            set -e

            # Caddyfile update
            cp /opt/openclaw/reverse-proxy/Caddyfile /opt/openclaw/reverse-proxy/Caddyfile.bak.$(date +%Y%m%d_%H%M%S) 2>/dev/null || true
            curl -fsSL "https://raw.githubusercontent.com/AIA2025/apexcore/$GITHUB_REF_NAME/Caddyfile" \
              > /opt/openclaw/reverse-proxy/Caddyfile
            docker exec caddy caddy validate --config /etc/caddy/Caddyfile 2>&1 | tail -2
            docker exec caddy caddy reload --config /etc/caddy/Caddyfile
            echo "✅ Caddy reloaded"

            # Dashboard update
            mkdir -p /opt/apexcore-dashboard
            curl -fsSL "https://raw.githubusercontent.com/AIA2025/apexcore/$GITHUB_REF_NAME/dashboard/index.html" \
              > /opt/apexcore-dashboard/index.html
            echo "✅ Dashboard updated"

            # cmd-api: deploy and ensure running
            mkdir -p /opt/apexcore/cmd-api
            curl -fsSL "https://raw.githubusercontent.com/AIA2025/apexcore/$GITHUB_REF_NAME/cmd-api/server.py" \
              > /opt/apexcore/cmd-api/server.py
            pkill -f "cmd-api/server.py" 2>/dev/null || true
            sleep 1
            CMD_TOKEN="${{ secrets.CMD_API_TOKEN }}" nohup python3 /opt/apexcore/cmd-api/server.py > /var/log/cmd-api.log 2>&1 &
            echo "✅ cmd-api started on port 7070"

            # Hermes Dispatcher: deploy and restart
            mkdir -p /opt/apexcore/hermes
            RAW_BASE="https://raw.githubusercontent.com/AIA2025/apexcore-group/$GITHUB_REF_NAME"
            curl -fsSL "${RAW_BASE}/hermes/dispatcher.js" > /opt/apexcore/hermes/dispatcher.js
            curl -fsSL "${RAW_BASE}/hermes/package.json"  > /opt/apexcore/hermes/package.json
            curl -fsSL "${RAW_BASE}/hermes/hermes.service" \
              | sed "s|DISPATCHER_TOKEN_PLACEHOLDER|${{ secrets.DISPATCHER_TOKEN }}|g" \
              > /etc/systemd/system/hermes.service
            cd /opt/apexcore/hermes && npm install --omit=dev --quiet
            systemctl daemon-reload
            systemctl enable hermes
            systemctl restart hermes
            echo "✅ Hermes Dispatcher restarted on :7071"

            # Paperclip seed scripts: keep in sync
            mkdir -p /opt/apexcore/paperclip
            curl -fsSL "${RAW_BASE}/paperclip/seed.sh"                  > /opt/apexcore/paperclip/seed.sh
            curl -fsSL "${RAW_BASE}/paperclip/agent-registration.json"  > /opt/apexcore/paperclip/agent-registration.json
            chmod +x /opt/apexcore/paperclip/seed.sh
            echo "✅ Paperclip seed scripts updated"

            # Docs: keep on VPS for APE-1 upload
            mkdir -p /opt/apexcore/docs
            curl -fsSL "${RAW_BASE}/docs/HERMESFLOWTECHNICALV1.md"   > /opt/apexcore/docs/HERMESFLOWTECHNICALV1.md
            curl -fsSL "${RAW_BASE}/docs/RUNBOOKORCHESTRATIONV1.md"  > /opt/apexcore/docs/RUNBOOKORCHESTRATIONV1.md
            echo "✅ Docs updated (/opt/apexcore/docs/)"

            # Stop old n8n instance
            docker stop n8n-lx1z-n8n-1 2>/dev/null && echo "✅ old n8n stopped" || true

            # Notion Backup Cronjob
            CRON="30 2 * * * /root/scripts/notion-backup.sh >> /root/logs/notion-backup.log 2>&1"
            crontab -l 2>/dev/null | grep -q "notion-backup" || \
              (crontab -l 2>/dev/null; echo "$CRON") | crontab -
            echo "✅ Cronjob active"

            echo "🚀 Deploy complete on $(hostname)"

      - name: Add DNS Records via Porkbun API
        if: ${{ env.PB_KEY != '' }}
        env:
          PB_KEY: ${{ secrets.PORKBUN_APIKEY }}
          PB_SECRET: ${{ secrets.PORKBUN_SECRETKEY }}
          DOMAIN: "apexcore.group"
          VPS_IP: "76.13.138.73"
        run: |
          add_record() {
            local name=$1
            R=$(curl -s -X POST "https://api.porkbun.com/api/json/v3/dns/create/$DOMAIN" \
              -H "Content-Type: application/json" \
              -d "{\"apikey\":\"$PB_KEY\",\"secretapikey\":\"$PB_SECRET\",\"name\":\"$name\",\"type\":\"A\",\"content\":\"$VPS_IP\",\"ttl\":\"300\"}")
            echo "$name: $(echo $R | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("status","?") + " " + str(d.get("id","")))')"
          }
          echo "Adding DNS A-records..."
          for sub in n8n openwebui hermes dashboard paperclip; do add_record "$sub"; done
          echo "DNS update done"
