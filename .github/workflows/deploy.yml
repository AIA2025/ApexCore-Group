name: Deploy to VPS

on:
  push:
    branches: [main, "claude/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notify VPS (best-effort — pull-based poller handles deployment)
        run: |
          BRANCH="${{ github.ref_name }}"
          SHA="${{ github.sha }}"
          echo "Commit $SHA on $BRANCH pushed."
          echo ""
          echo "VPS deploy model: pull-based (apexcore-poller.timer, every 2 min)."
          echo "The VPS polls github.com/AIA2025/ApexCore-Group for new commits"
          echo "and triggers cmd-api /deploy automatically — no inbound access needed."
          echo ""

          # Best-effort direct webhook (succeeds only if port 7070 happens to be reachable)
          HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST http://76.13.138.73:7070/deploy \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CMD_API_TOKEN }}" \
            -d "{\"branch\":\"$BRANCH\",\"cmd_token\":\"${{ secrets.CMD_API_TOKEN }}\"}" \
            --connect-timeout 5 --max-time 8 2>/dev/null || echo "000")

          if [ "$HTTP" = "202" ]; then
            echo "Direct webhook delivered (HTTP 202) — deploy in progress."
          else
            echo "::notice::VPS not reachable via webhook (HTTP $HTTP) — poller will deploy within 2 min."
          fi

      - name: Add DNS Records via Porkbun API
        if: ${{ env.PB_KEY != '' }}
        env:
          PB_KEY: ${{ secrets.PORKBUN_APIKEY }}
          PB_SECRET: ${{ secrets.PORKBUN_SECRETKEY }}
          DOMAIN: "apexcore.group"
          VPS_IP: "76.13.138.73"
        run: |
          add_record() {
            local name=$1
            R=$(curl -s -X POST "https://api.porkbun.com/api/json/v3/dns/create/$DOMAIN" \
              -H "Content-Type: application/json" \
              -d "{\"apikey\":\"$PB_KEY\",\"secretapikey\":\"$PB_SECRET\",\"name\":\"$name\",\"type\":\"A\",\"content\":\"$VPS_IP\",\"ttl\":\"300\"}")
            echo "$name: $(echo $R | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("status","?") + " " + str(d.get("id","")))')"
          }
          echo "Adding DNS A-records..."
          for sub in n8n openwebui hermes dashboard paperclip scanner; do add_record "$sub"; done
          echo "DNS update done"
