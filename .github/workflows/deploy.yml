name: Deploy to VPS

on:
  push:
    branches: [main, "claude/**"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Notify VPS webhook (best-effort)
        # VPS auto-deploys every 5 min via systemd timer — this is just a fast-path hint.
        # Hostinger CDN/firewall may block GitHub Actions IPs; CI never fails on this.
        continue-on-error: true
        run: |
          BRANCH="${{ github.ref_name }}"
          echo "Trying fast-path webhook for branch: $BRANCH"

          HTTP=$(curl -s -o /tmp/resp.json -w "%{http_code}" \
            -X POST "https://hermes.apexcore.group/cmd-api/deploy" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.CMD_API_TOKEN }}" \
            -d "{\"branch\":\"$BRANCH\"}" \
            --connect-timeout 8 --max-time 12)

          if [ "$HTTP" = "202" ]; then
            echo "Webhook accepted (202) — VPS deploying now"
            echo "Waiting 60s for deploy to finish..."
            sleep 60
            curl -sf "https://hermes.apexcore.group/cmd-api/health" \
              && echo "cmd-api healthy after deploy" \
              || echo "cmd-api health check failed (non-fatal)"
          else
            echo "Webhook returned HTTP $HTTP ($(cat /tmp/resp.json))"
            echo "VPS will auto-deploy within 5 minutes via systemd timer — OK"
          fi

      - name: Add DNS Records via Porkbun API
        # Note: step-level env: is not available in if: expressions — check inline
        env:
          PB_KEY: ${{ secrets.PORKBUN_APIKEY }}
          PB_SECRET: ${{ secrets.PORKBUN_SECRETKEY }}
          DOMAIN: "apexcore.group"
          VPS_IP: "76.13.138.73"
        run: |
          if [ -z "$PB_KEY" ]; then
            echo "PORKBUN_APIKEY not configured — skipping DNS update"
            exit 0
          fi
          add_record() {
            local name=$1
            R=$(curl -s -X POST "https://api.porkbun.com/api/json/v3/dns/create/$DOMAIN" \
              -H "Content-Type: application/json" \
              -d "{\"apikey\":\"$PB_KEY\",\"secretapikey\":\"$PB_SECRET\",\"name\":\"$name\",\"type\":\"A\",\"content\":\"$VPS_IP\",\"ttl\":\"300\"}")
            echo "$name: $(echo $R | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("status","?") + " " + str(d.get("id","")))')"
          }
          echo "Adding DNS A-records..."
          for sub in ai hermes n8n ops dashboard openwebui oc oc-staging paperclip; do add_record "$sub"; done
          echo "DNS update done"
