name: Deploy to VPS

on:
  push:
    branches: [main, "claude/**"]
  workflow_dispatch:  # allow manual re-trigger from GitHub UI

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Package deploy artifacts ──────────────────────────────────────
      # Single tar.gz is more reliable than multi-file scp-action source lists.
      # Excludes: .git, .github/secrets, legacy docs, local-only files.
      - name: Package deploy artifacts
        run: |
          tar -czf apexcore-deploy.tar.gz \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='docs/legacy' \
            --exclude='backups' \
            infra-compose \
            ai-stack \
            automation-stack \
            cmd-api \
            dashboard \
            scripts \
            docs \
            n8n-workflows
          echo "Package size: $(du -sh apexcore-deploy.tar.gz | cut -f1)"

      # ── Upload package to VPS ─────────────────────────────────────────
      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 76.13.138.73
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          source: "apexcore-deploy.tar.gz"
          target: "/tmp/"

      # ── Extract and apply on VPS ──────────────────────────────────────
      - name: Apply config on VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 76.13.138.73
          username: root
          key: ${{ secrets.VPS_DEPLOY_KEY }}
          script: |
            set -e

            # ── Extract repo files ────────────────────────────────────────
            mkdir -p /srv/apexcore/backups
            tar xzf /tmp/apexcore-deploy.tar.gz -C /srv/apexcore/ --overwrite
            rm -f /tmp/apexcore-deploy.tar.gz
            chmod +x /srv/apexcore/scripts/*.sh 2>/dev/null || true
            echo "✅ Files extracted to /srv/apexcore/"

            # ── Caddy config ──────────────────────────────────────────────
            CADDY_OLD=/opt/openclaw/reverse-proxy/Caddyfile
            CADDY_NEW=/srv/apexcore/infra-compose/Caddyfile
            TS=$(date +%Y%m%d_%H%M%S)

            # Backup then sync old path (running container still mounts it)
            if [ -f "$CADDY_OLD" ]; then
              cp "$CADDY_OLD" "/srv/apexcore/backups/Caddyfile.bak.$TS"
              cp "$CADDY_NEW" "$CADDY_OLD"
            fi

            # Reload if caddy is running
            if docker inspect caddy &>/dev/null 2>&1; then
              docker exec caddy caddy validate --config /etc/caddy/Caddyfile 2>&1 | tail -3
              docker exec caddy caddy reload --config /etc/caddy/Caddyfile
              echo "✅ Caddy reloaded"
            else
              echo "⚠️  Caddy not running — run scripts/stack-start.sh to start"
            fi

            # ── Dashboard (legacy path kept in sync) ──────────────────────
            mkdir -p /opt/apexcore-dashboard
            cp /srv/apexcore/dashboard/index.html /opt/apexcore-dashboard/index.html
            echo "✅ Dashboard updated"

            # ── cmd-api ───────────────────────────────────────────────────
            pkill -f "cmd-api/server.py" 2>/dev/null || true
            sleep 1
            CMD_TOKEN="${{ secrets.CMD_API_TOKEN }}" \
              nohup python3 /srv/apexcore/cmd-api/server.py \
              > /var/log/cmd-api.log 2>&1 &
            echo "✅ cmd-api started on :7070"

            # ── hermes dispatcher ─────────────────────────────────────────
            pkill -f "hermes_dispatcher.py" 2>/dev/null || true
            sleep 1
            if [ -f /srv/apexcore/cmd-api/.env.dispatcher ]; then
              set -a; source /srv/apexcore/cmd-api/.env.dispatcher; set +a
              nohup python3 /srv/apexcore/cmd-api/hermes_dispatcher.py \
                > /var/log/apexcore-dispatcher.log 2>&1 &
              echo "✅ hermes dispatcher started on :7071"
            else
              echo "⚠️  /srv/apexcore/cmd-api/.env.dispatcher not found — dispatcher not started"
              echo "    Run: cp /srv/apexcore/cmd-api/.env.dispatcher.example /srv/apexcore/cmd-api/.env.dispatcher"
            fi

            # ── Docker Compose stacks (up -d, no recreation unless changed) ─
            cd /srv/apexcore
            if docker network inspect ai_net &>/dev/null 2>&1; then
              docker compose -f ai-stack/docker-compose.yml         up -d --remove-orphans 2>&1 | tail -5
              docker compose -f automation-stack/docker-compose.yml up -d --remove-orphans 2>&1 | tail -5
              docker compose -f infra-compose/docker-compose.yml    up -d --remove-orphans 2>&1 | tail -5
              echo "✅ Compose stacks refreshed"
            else
              echo "⚠️  ai_net not found — run scripts/stack-start.sh to initialise stacks"
            fi

            # ── Legacy n8n cleanup ────────────────────────────────────────
            docker stop n8n-lx1z-n8n-1 2>/dev/null && echo "✅ legacy n8n stopped" || true

            # ── Notion backup cron ────────────────────────────────────────
            CRON="30 2 * * * /root/scripts/notion-backup.sh >> /root/logs/notion-backup.log 2>&1"
            crontab -l 2>/dev/null | grep -q "notion-backup" || \
              (crontab -l 2>/dev/null; echo "$CRON") | crontab -
            echo "✅ Notion backup cron active"

            echo ""
            echo "🚀 Deploy complete: $(hostname) @ $(date)"
            docker ps --format "  {{.Names}}\t{{.Status}}" 2>/dev/null | sort || true

      # ── DNS Records via Porkbun ───────────────────────────────────────
      # Runs on every deploy. Porkbun API is idempotent (duplicate records are ignored).
      # Skips gracefully if PORKBUN_APIKEY secret is not set.
      - name: Update DNS Records via Porkbun
        env:
          PB_KEY: ${{ secrets.PORKBUN_APIKEY }}
          PB_SECRET: ${{ secrets.PORKBUN_SECRETKEY }}
          DOMAIN: "apexcore.group"
          VPS_IP: "76.13.138.73"
        run: |
          if [ -z "$PB_KEY" ]; then
            echo "PORKBUN_APIKEY not configured — skipping DNS update"
            exit 0
          fi
          add_record() {
            local name=$1
            R=$(curl -s -X POST "https://api.porkbun.com/api/json/v3/dns/create/$DOMAIN" \
              -H "Content-Type: application/json" \
              -d "{\"apikey\":\"$PB_KEY\",\"secretapikey\":\"$PB_SECRET\",\"name\":\"$name\",\"type\":\"A\",\"content\":\"$VPS_IP\",\"ttl\":\"300\"}")
            STATUS=$(echo "$R" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("status","?"))' 2>/dev/null || echo "parse-error")
            echo "  $name.$DOMAIN → $VPS_IP  ($STATUS)"
          }
          echo "Updating DNS A-records for $DOMAIN → $VPS_IP"
          for sub in ai hermes n8n ops dashboard openwebui oc oc-staging paperclip; do
            add_record "$sub"
          done
          echo "DNS update complete"
