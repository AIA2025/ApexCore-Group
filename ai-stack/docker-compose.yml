# ai-stack/docker-compose.yml
# Stack: AI Services
#
# Services: open-webui, hermes-agent, hermes-webui, ollama, openclaw
# Network: ai_net (created here, joined externally by infra-compose and automation-stack)
#
# Usage:
#   cd /srv/apexcore && docker compose -f ai-stack/docker-compose.yml up -d
#
# To start OpenClaw (requires OPENCLAW_IMAGE in .env):
#   docker compose -f ai-stack/docker-compose.yml --profile ops up -d

networks:
  ai_net:
    name: ai_net
    driver: bridge

services:

  # ────────────────────────────────────────────────────────────────────────
  # open-webui — Primary Chat Frontend / Operator Console
  # Connects to: hermes-agent (primary LLM), ollama (local models)
  # External: ai.apexcore.group
  # ────────────────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:8080"  # local debug only; Caddy routes via container name
    volumes:
      - open_webui_data:/app/backend/data
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URL=http://hermes-agent:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - WEBUI_NAME=ApexCore AI
    networks:
      - ai_net
    depends_on:
      - hermes-agent
      - ollama
    healthcheck:
      # open-webui is Python-based; use wget (busybox) or python fallback
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1 || python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  # ────────────────────────────────────────────────────────────────────────
  # hermes-agent — LLM Orchestrator / OpenAI-compatible API gateway
  # Backend: LiteLLM → OpenRouter (Claude, Kimi, GPT-4o, auto)
  # Internal API: http://hermes-agent:4000/v1
  # External: not exposed — internal use by open-webui, hermes-webui, n8n
  # ────────────────────────────────────────────────────────────────────────
  hermes-agent:
    image: ghcr.io/berriai/litellm:main-stable
    container_name: hermes-agent
    restart: unless-stopped
    ports:
      - "127.0.0.1:4000:4000"  # local debug only
    volumes:
      - ./hermes-config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    networks:
      - ai_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health/liveliness >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ────────────────────────────────────────────────────────────────────────
  # hermes-webui — Hermes Control Panel
  # Separate Open WebUI instance wired exclusively to hermes-agent.
  # Used for: system prompt design, agent config, model testing.
  # External: hermes.apexcore.group
  # ────────────────────────────────────────────────────────────────────────
  hermes-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: hermes-webui
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:8080"
    volumes:
      - hermes_webui_data:/app/backend/data
    environment:
      - OPENAI_API_BASE_URL=http://hermes-agent:4000/v1
      - OPENAI_API_KEY=${LITELLM_MASTER_KEY}
      - WEBUI_AUTH=${WEBUI_AUTH:-true}
      - WEBUI_NAME=Hermes Control Panel
      - ENABLE_OLLAMA_API=false
    networks:
      - ai_net
    depends_on:
      - hermes-agent
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health >/dev/null 2>&1"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s

  # ────────────────────────────────────────────────────────────────────────
  # ollama — Local LLM Inference (optional)
  # Used by open-webui for private/offline models.
  # No external access. Disable by removing OLLAMA_BASE_URL from open-webui env.
  # ────────────────────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "127.0.0.1:11434:11434"  # local debug only — never expose externally
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - ai_net

  # ────────────────────────────────────────────────────────────────────────
  # openclaw — Ops / Messenger Agent
  # Role: action execution, WhatsApp/Telegram integration, external ops tasks
  # REQUIRES: set OPENCLAW_IMAGE in ai-stack/.env before enabling
  # Activate: docker compose --profile ops up -d
  # External: ops.apexcore.group (and oc.apexcore.group for legacy)
  # ────────────────────────────────────────────────────────────────────────
  openclaw:
    image: ${OPENCLAW_IMAGE:-ghcr.io/aia2025/openclaw:latest}
    container_name: openclaw
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - openclaw_data:/app/data
    env_file:
      - .env
    networks:
      - ai_net
    profiles:
      - ops  # disabled by default; requires OPENCLAW_IMAGE and explicit --profile ops

volumes:
  open_webui_data:
    name: open_webui_data
  hermes_webui_data:
    name: hermes_webui_data
  ollama_data:
    name: ollama_data
  openclaw_data:
    name: openclaw_data
